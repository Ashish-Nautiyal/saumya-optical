<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>
  
  <!-- Glasses Icon -->
  <g transform="translate(10, 15)">
    <!-- Left Lens -->
    <ellipse cx="22" cy="25" rx="18" ry="14" fill="none" stroke="url(#logoGrad)" stroke-width="3.5"/>
    <!-- Right Lens -->
    <ellipse cx="58" cy="25" rx="18" ry="14" fill="none" stroke="url(#logoGrad)" stroke-width="3.5"/>
    <!-- Bridge -->
    <path d="M40 25 Q43 20 46 25" fill="none" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Left Temple -->
    <path d="M4 22 L0 18" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right Temple -->
    <path d="M76 22 L80 18" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text: Saumya -->
  <text x="105" y="38" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Saumya</text>
  
  <!-- Text: Optical -->
  <text x="105" y="58" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#14b8a6" letter-spacing="2">OPTICAL</text>
</svg>
